name: Daily Medical Triage Train

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Debug environment
        run: |
          python - <<'PY'
          import os
          print("OPENAI_API_KEY exists:", bool(os.getenv("OPENAI_API_KEY")))
          print("HF_TOKEN exists:", bool(os.getenv("HF_TOKEN")))
          print("API_KEY exists:", bool(os.getenv("API_KEY")))
          print("API_BASE_URL:", os.getenv("API_BASE_URL", "https://api.openai.com/v1"))
          PY
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          API_KEY: ${{ secrets.API_KEY }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Test OpenAI connectivity
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          curl --fail --silent --show-error https://api.openai.com/v1/models \
            -H "Authorization: Bearer $OPENAI_API_KEY" > /dev/null

      - name: Run training rollout script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python train.py 

      - name: Upload rollout artifact
        uses: actions/upload-artifact@v4
        with:
          name: train-rollouts
          path: train_rollouts.jsonl
